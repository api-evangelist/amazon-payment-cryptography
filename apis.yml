- aid: amazon-payment-cryptography:aws-payment-cryptography-api
  name: AWS Payment Cryptography API
  description: >-
    The AWS Payment Cryptography API provides programmatic access to manage
    keys, aliases, and perform cryptographic operations for payment processing
    applications that require PCI-compliant security.
