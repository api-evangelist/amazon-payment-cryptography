aid: amazon-payment-cryptography
name: Amazon Payment Cryptography
description: >-
  AWS Payment Cryptography is a managed service that makes it easy to build
  and maintain payment processing applications by providing cloud-based
  cryptographic capabilities. It enables you to perform cryptographic operations
  required by payment card industry standards without managing hardware security
  modules.
